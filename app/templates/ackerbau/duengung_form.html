{% extends 'base.html' %}
{% block title %}Düngung eintragen – {{ schlag.name }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('ackerbau.schlag_detail', schlag_id=schlag.id) }}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h2><i class="bi bi-bag"></i> Düngung eintragen – {{ schlag.name }}</h2>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST" id="duengForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Datum *</label>
                            <input type="date" name="datum" class="form-control" required value="{{ heute.strftime('%Y-%m-%d') }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Kultur</label>
                            <select name="kultur_id" class="form-select">
                                <option value="">– optional –</option>
                                {% for k in kulturen %}
                                <option value="{{ k.id }}" {% if k.ist_aktiv %}selected{% endif %}>
                                    {{ k.kultur_name }} ({{ k.aussaat_datum.strftime('%Y') }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Düngerart *</label>
                            <select name="duenger_art" class="form-select" required>
                                {% for wert, label in duenger_arten %}
                                <option value="{{ wert }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Düngerbezeichnung</label>
                            <input type="text" name="duenger_name" class="form-control" placeholder="z.B. KAS 27%, Gülle Rind">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">N-Gehalt (kg/Einheit)</label>
                            <input type="number" step="0.01" name="n_gehalt" id="n_gehalt" class="form-control" placeholder="z.B. 0.27">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">P₂O₅-Gehalt (kg/Einheit)</label>
                            <input type="number" step="0.01" name="p_gehalt" id="p_gehalt" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">K₂O-Gehalt (kg/Einheit)</label>
                            <input type="number" step="0.01" name="k_gehalt" id="k_gehalt" class="form-control">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Menge *</label>
                            <input type="number" step="0.01" name="menge" id="menge" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Einheit</label>
                            <select name="einheit" class="form-select">
                                {% for wert, label in duenger_einheiten %}
                                <option value="{{ wert }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Behandelte Fläche (ha)</label>
                            <input type="number" step="0.0001" name="behandelte_flaeche" class="form-control"
                                   value="{{ schlag.flaeche_ha or '' }}">
                        </div>
                    </div>
                    <!-- Vorschau -->
                    <div class="alert alert-info d-none" id="naehrstoffVorschau">
                        Nährstoffe: <strong id="vN">–</strong> kg N &nbsp;|&nbsp;
                        <strong id="vP">–</strong> kg P₂O₅ &nbsp;|&nbsp;
                        <strong id="vK">–</strong> kg K₂O (je ha)
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ausbringverfahren</label>
                            <select name="ausbringverfahren" class="form-select">
                                <option value="">– optional –</option>
                                {% for av in ausbringverfahren %}
                                <option value="{{ av }}">{{ av }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3 d-flex align-items-end">
                            <div class="form-check">
                                <input type="checkbox" name="einarbeitung" id="einarbeitung" class="form-check-input" value="1">
                                <label for="einarbeitung" class="form-check-label">Eingearbeitet (innerhalb 4h)</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bemerkungen</label>
                        <textarea name="bemerkungen" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning"><i class="bi bi-check-lg"></i> Speichern</button>
                        <a href="{{ url_for('ackerbau.schlag_detail', schlag_id=schlag.id) }}" class="btn btn-outline-secondary">Abbrechen</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function berechne() {
    const menge = parseFloat(document.getElementById('menge').value) || 0;
    const n = parseFloat(document.getElementById('n_gehalt').value) || 0;
    const p = parseFloat(document.getElementById('p_gehalt').value) || 0;
    const k = parseFloat(document.getElementById('k_gehalt').value) || 0;
    if (menge > 0 && (n > 0 || p > 0 || k > 0)) {
        document.getElementById('vN').textContent = (menge * n).toFixed(1);
        document.getElementById('vP').textContent = (menge * p).toFixed(1);
        document.getElementById('vK').textContent = (menge * k).toFixed(1);
        document.getElementById('naehrstoffVorschau').classList.remove('d-none');
    }
}
['menge', 'n_gehalt', 'p_gehalt', 'k_gehalt'].forEach(id => {
    document.getElementById(id).addEventListener('input', berechne);
});
</script>
{% endblock %}
