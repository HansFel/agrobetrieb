{% extends 'base.html' %}
{% block title %}{% if sm %}Spritzmittel bearbeiten{% else %}Neues Spritzmittel{% endif %}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('ackerbau.spritzmittel_liste') }}" class="btn btn-outline-secondary btn-sm me-3"><i class="bi bi-arrow-left"></i></a>
    <h2>{% if sm %}<i class="bi bi-pencil"></i> Spritzmittel bearbeiten{% else %}<i class="bi bi-plus-circle"></i> Neues Spritzmittel{% endif %}</h2>
</div>

<div class="row">
    <div class="col-md-7">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Produktname *</label>
                        <input type="text" name="name" class="form-control" required
                               value="{{ sm.name if sm else '' }}" placeholder="z.B. Roundup PowerFlex">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Kategorie</label>
                            <select name="kategorie" class="form-select">
                                <option value="">– bitte wählen –</option>
                                {% for k in kategorien %}
                                <option value="{{ k }}" {% if sm and sm.kategorie == k %}selected{% endif %}>{{ k }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Einheit</label>
                            <select name="einheit" class="form-select">
                                {% for wert, label in einheiten %}
                                <option value="{{ wert }}" {% if sm and sm.einheit == wert %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Wirkstoff</label>
                        <input type="text" name="wirkstoff" class="form-control"
                               value="{{ sm.wirkstoff if sm else '' }}" placeholder="z.B. Glyphosat 480 g/l">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Zulassungsnummer</label>
                            <input type="text" name="zulassungsnummer" class="form-control"
                                   value="{{ sm.zulassungsnummer if sm else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Registernummer</label>
                            <input type="text" name="registernummer" class="form-control"
                                   value="{{ sm.registernummer if sm else '' }}">
                        </div>
                    </div>
                    {% if sm %}
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="aktiv" id="aktiv" class="form-check-input"
                                   {% if sm.aktiv %}checked{% endif %}>
                            <label for="aktiv" class="form-check-label">Aktiv (in Auswahllisten anzeigen)</label>
                        </div>
                    </div>
                    {% endif %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Speichern</button>
                        <a href="{{ url_for('ackerbau.spritzmittel_liste') }}" class="btn btn-outline-secondary">Abbrechen</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
