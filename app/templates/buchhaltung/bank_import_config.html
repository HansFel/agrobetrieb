{% extends 'base.html' %}
{% block title %}Bankimport Konfiguration{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8"><div class="card shadow-sm"><div class="card-header"><h1 class="h4 mb-0">Bankimport Konfiguration</h1></div><div class="card-body"><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-6"><label class="form-label">Bankname</label><input class="form-control" name="bank_name" value="{{ config.bank_name or '' }}"></div><div class="col-md-3"><label class="form-label">Trennzeichen</label><input class="form-control" name="trennzeichen" value="{{ config.trennzeichen or ';' }}"></div><div class="col-md-3"><label class="form-label">Encoding</label><input class="form-control" name="encoding" value="{{ config.encoding or 'utf-8-sig' }}"></div><div class="col-md-3"><label class="form-label">Spalte Datum</label><input class="form-control" type="number" name="spalte_datum" value="{{ config.spalte_datum or 0 }}"></div><div class="col-md-3"><label class="form-label">Spalte Valuta</label><input class="form-control" type="number" name="spalte_valuta" value="{{ config.spalte_valuta if config.spalte_valuta is not none else '' }}"></div><div class="col-md-3"><label class="form-label">Spalte Betrag</label><input class="form-control" type="number" name="spalte_betrag" value="{{ config.spalte_betrag or 1 }}"></div><div class="col-md-3"><label class="form-label">Spalte Text</label><input class="form-control" type="number" name="spalte_text" value="{{ config.spalte_text or 2 }}"></div><div class="col-md-4"><label class="form-label">Spalte Referenz</label><input class="form-control" type="number" name="spalte_referenz" value="{{ config.spalte_referenz if config.spalte_referenz is not none else '' }}"></div><div class="col-md-4"><label class="form-label">Datumsformat</label><input class="form-control" name="datumsformat" value="{{ config.datumsformat or '%d.%m.%Y' }}"></div><div class="col-md-4"><label class="form-label">Dezimaltrennzeichen</label><input class="form-control" name="dezimaltrennzeichen" value="{{ config.dezimaltrennzeichen or ',' }}"></div><div class="col-md-4"><label class="form-label">Kopfzeilen überspringen</label><input class="form-control" type="number" name="kopfzeilen_ueberspringen" value="{{ config.kopfzeilen_ueberspringen or 0 }}"></div><div class="col-md-4 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" name="vorzeichen_umkehren" id="vorzeichen_umkehren" {% if config.vorzeichen_umkehren %}checked{% endif %}><label class="form-check-label" for="vorzeichen_umkehren">Vorzeichen umkehren</label></div></div></div><div class="d-flex justify-content-between mt-4"><a class="btn btn-outline-secondary" href="{{ url_for('buchhaltung.bank_import') }}">Zurück</a><button class="btn btn-primary" type="submit">Speichern</button></div></form></div></div></div></div>
{% endblock %}
