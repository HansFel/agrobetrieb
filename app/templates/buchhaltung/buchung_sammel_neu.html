{% extends 'base.html' %}
{% block title %}Sammelbuchung{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-10">
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h1 class="h4 mb-0">Sammelbuchung</h1>
                <span class="text-muted">Mehrere Zeilen gegen ein Gegenkonto</span>
            </div>
            <div class="card-body">
                <form method="post" id="sammel-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3 mb-3">
                        <div class="col-md-3"><label class="form-label">Datum</label><input class="form-control" type="date" name="datum" value="{{ heute }}" required></div>
                        <div class="col-md-3"><label class="form-label">Belegdatum</label><input class="form-control" type="date" name="beleg_datum"></div>
                        <div class="col-md-3"><label class="form-label">Geschäftsjahr</label><input class="form-control" type="number" name="geschaeftsjahr" value="{{ aktuelles_gj }}" required></div>
                        <div class="col-md-3"><label class="form-label">Richtung</label><select class="form-select" name="richtung"><option value="ausgabe">Ausgabe</option><option value="einnahme">Einnahme</option></select></div>
                        <div class="col-md-8"><label class="form-label">Gegenkonto</label><select class="form-select" name="gegenkonto_id" required>{% for konto in konten %}<option value="{{ konto.id }}">{{ konto.kontonummer }} - {{ konto.bezeichnung }}</option>{% endfor %}</select></div>
                        <div class="col-md-4"><label class="form-label">Belegnummer</label><input class="form-control" name="beleg_nummer"></div>
                    </div>

                    <div class="table-responsive">
                        <table class="table" id="zeilen-tabelle">
                            <thead><tr><th>Konto</th><th>Betrag</th><th>Text</th><th></th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-outline-secondary" type="button" id="zeile-add">Zeile hinzufügen</button>
                        <button class="btn btn-primary" type="submit">Sammelbuchung speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const konten = [{% for konto in konten %}{id: {{ konto.id }}, text: '{{ konto.kontonummer }} - {{ konto.bezeichnung|replace("'", "\\'") }}'},{% endfor %}];
const tbody = document.querySelector('#zeilen-tabelle tbody');
let index = 0;
function addRow() {
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><select class="form-select" name="konto_${index}" required>${konten.map(k => `<option value="${k.id}">${k.text}</option>`).join('')}</select></td>
        <td><input class="form-control" name="betrag_${index}" placeholder="0,00" required></td>
        <td><input class="form-control" name="text_${index}" placeholder="optional"></td>
        <td class="text-end"><button class="btn btn-sm btn-outline-danger" type="button">Entfernen</button></td>`;
    row.querySelector('button').addEventListener('click', () => row.remove());
    tbody.appendChild(row);
    index += 1;
}
document.getElementById('zeile-add').addEventListener('click', addRow);
addRow();
addRow();
</script>
{% endblock %}
