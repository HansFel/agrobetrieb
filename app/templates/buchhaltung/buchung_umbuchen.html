{% extends 'base.html' %}
{% block title %}Buchung umbuchen{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8"><div class="card shadow-sm"><div class="card-header"><h1 class="h4 mb-0">Buchung {{ buchung.buchungsnummer }} umbuchen</h1></div><div class="card-body"><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-6"><label class="form-label">Sollkonto</label><select class="form-select" name="soll_konto_id" required>{% for konto in konten %}<option value="{{ konto.id }}" {% if buchung.soll_konto_id == konto.id %}selected{% endif %}>{{ konto.kontonummer }} - {{ konto.bezeichnung }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Habenkonto</label><select class="form-select" name="haben_konto_id" required>{% for konto in konten %}<option value="{{ konto.id }}" {% if buchung.haben_konto_id == konto.id %}selected{% endif %}>{{ konto.kontonummer }} - {{ konto.bezeichnung }}</option>{% endfor %}</select></div><div class="col-12"><label class="form-label">Buchungstext</label><input class="form-control" name="buchungstext" value="{{ buchung.buchungstext }}"></div></div><div class="d-flex justify-content-between mt-4"><a class="btn btn-outline-secondary" href="{{ url_for('buchhaltung.journal') }}">Abbrechen</a><button class="btn btn-primary" type="submit">Umbuchen</button></div></form></div></div></div></div>
{% endblock %}
