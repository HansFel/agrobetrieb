{% extends 'base.html' %}
{% block title %}Buchungsschlüssel{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8"><div class="card shadow-sm"><div class="card-header"><h1 class="h4 mb-0">{{ 'Neuer' if not bs else 'Buchungsschlüssel bearbeiten' }}</h1></div><div class="card-body"><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-3"><label class="form-label">Kürzel</label><input class="form-control" name="kuerzel" value="{{ bs.kuerzel if bs else '' }}" required></div><div class="col-md-9"><label class="form-label">Bezeichnung</label><input class="form-control" name="bezeichnung" value="{{ bs.bezeichnung if bs else '' }}" required></div><div class="col-12"><label class="form-label">Buchungstext</label><input class="form-control" name="buchungstext" value="{{ bs.buchungstext if bs else '' }}"></div><div class="col-md-6"><label class="form-label">Sollkonto</label><select class="form-select" name="soll_konto_id"><option value="">-</option>{% for konto in konten %}<option value="{{ konto.id }}" {% if bs and bs.soll_konto_id == konto.id %}selected{% endif %}>{{ konto.kontonummer }} - {{ konto.bezeichnung }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Habenkonto</label><select class="form-select" name="haben_konto_id"><option value="">-</option>{% for konto in konten %}<option value="{{ konto.id }}" {% if bs and bs.haben_konto_id == konto.id %}selected{% endif %}>{{ konto.kontonummer }} - {{ konto.bezeichnung }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Soll-Klassen</label><input class="form-control" name="soll_klassen" value="{{ bs.soll_klassen if bs else '' }}"></div><div class="col-md-6"><label class="form-label">Haben-Klassen</label><input class="form-control" name="haben_klassen" value="{{ bs.haben_klassen if bs else '' }}"></div><div class="col-md-8"><label class="form-label">Suchbegriffe</label><input class="form-control" name="suchbegriffe" value="{{ bs.suchbegriffe if bs else '' }}"></div><div class="col-md-2"><label class="form-label">Sortierung</label><input class="form-control" type="number" name="sortierung" value="{{ bs.sortierung if bs else 0 }}"></div><div class="col-md-2 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" name="aktiv" id="aktiv" {% if not bs or bs.aktiv %}checked{% endif %}><label class="form-check-label" for="aktiv">Aktiv</label></div></div></div><div class="d-flex justify-content-between mt-4"><a class="btn btn-outline-secondary" href="{{ url_for('buchhaltung.buchungsschluessel_liste') }}">Zurück</a><button class="btn btn-primary" type="submit">Speichern</button></div></form></div></div></div></div>
{% endblock %}
