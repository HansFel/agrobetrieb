{% extends 'base.html' %}
{% block title %}Buchungsschlüssel importieren{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7"><div class="card shadow-sm"><div class="card-header"><h1 class="h4 mb-0">Buchungsschlüssel importieren</h1></div><div class="card-body"><form method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label class="form-label">JSON-Datei</label><input class="form-control" type="file" name="datei" accept="application/json" required><div class="d-flex justify-content-between mt-4"><a class="btn btn-outline-secondary" href="{{ url_for('buchhaltung.buchungsschluessel_liste') }}">Zurück</a><button class="btn btn-primary" type="submit">Importieren</button></div></form></div></div></div></div>
{% endblock %}
