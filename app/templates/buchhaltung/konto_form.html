{% extends 'base.html' %}
{% block title %}Konto{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header"><h1 class="h4 mb-0">{{ 'Neues Konto' if neu else 'Konto bearbeiten' }}</h1></div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Kontonummer</label>
                            <input class="form-control" name="kontonummer" value="{{ konto.kontonummer if konto else '' }}" {{ 'readonly' if konto else 'required' }}>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Bezeichnung</label>
                            <input class="form-control" name="bezeichnung" value="{{ konto.bezeichnung if konto else '' }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Klasse</label>
                            <select class="form-select" name="kontenklasse" {{ 'disabled' if konto else 'required' }}>
                                {% for nummer in range(0, 10) %}
                                <option value="{{ nummer }}" {% if konto and konto.kontenklasse == nummer %}selected{% endif %}>{{ nummer }} - {{ {0:'Anlagevermögen',1:'Vorräte',2:'Forderungen',3:'Bank & Kassa',4:'Verbindlichkeiten',5:'Eigenkapital',6:'Aufwendungen',7:'Erträge',8:'Eröffnung/Abschluss',9:'Maschinen-Detail'}.get(nummer, '') }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Typ</label>
                            <select class="form-select" name="kontotyp" required>
                                {% for typ in ['aktiv', 'passiv', 'aufwand', 'ertrag'] %}
                                <option value="{{ typ }}" {% if konto and konto.kontotyp == typ %}selected{% endif %}>{{ typ|capitalize }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <div class="form-check me-3"><input class="form-check-input" type="checkbox" name="aktiv" id="aktiv" {% if not konto or konto.aktiv %}checked{% endif %}><label class="form-check-label" for="aktiv">Aktiv</label></div>
                        </div>
                        <div class="col-12 d-flex flex-wrap gap-3">
                            <div class="form-check"><input class="form-check-input" type="checkbox" name="jahresuebertrag" id="jahresuebertrag" {% if konto and konto.jahresuebertrag %}checked{% endif %}><label class="form-check-label" for="jahresuebertrag">Jahresübertrag</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" name="ist_sammelkonto" id="ist_sammelkonto" {% if konto and konto.ist_sammelkonto %}checked{% endif %}><label class="form-check-label" for="ist_sammelkonto">Sammelkonto</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" name="ist_importkonto" id="ist_importkonto" {% if konto and konto.ist_importkonto %}checked{% endif %}><label class="form-check-label" for="ist_importkonto">Importkonto</label></div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a class="btn btn-outline-secondary" href="{{ url_for('buchhaltung.kontenplan') }}">Zurück</a>
                        <button class="btn btn-primary" type="submit">Speichern</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
