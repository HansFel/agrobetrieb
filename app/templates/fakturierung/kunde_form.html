{% extends 'base.html' %}
{% block title %}Kunde{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8"><div class="card shadow-sm"><div class="card-header"><h1 class="h4 mb-0">{{ 'Neuer Kunde' if not kunde else 'Kunde bearbeiten' }}</h1></div><div class="card-body"><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-12"><label class="form-label">Name</label><input type="text" name="name" class="form-control" value="{{ kunde.name if kunde else '' }}" required></div><div class="col-12"><label class="form-label">Adresse</label><input type="text" name="adresse" class="form-control" value="{{ kunde.adresse if kunde else '' }}"></div><div class="col-md-4"><label class="form-label">PLZ</label><input type="text" name="plz" class="form-control" value="{{ kunde.plz if kunde else '' }}"></div><div class="col-md-8"><label class="form-label">Ort</label><input type="text" name="ort" class="form-control" value="{{ kunde.ort if kunde else '' }}"></div><div class="col-md-6"><label class="form-label">E-Mail</label><input type="email" name="email" class="form-control" value="{{ kunde.email if kunde else '' }}"></div><div class="col-md-6"><label class="form-label">Telefon</label><input type="text" name="telefon" class="form-control" value="{{ kunde.telefon if kunde else '' }}"></div><div class="col-md-6"><label class="form-label">UID-Nummer</label><input type="text" name="uid_nummer" class="form-control" value="{{ kunde.uid_nummer if kunde else '' }}"></div><div class="col-md-6"><label class="form-label">IBAN</label><input type="text" name="iban" class="form-control" value="{{ kunde.iban if kunde else '' }}"></div><div class="col-md-12"><label class="form-label">Konto Klasse 2</label><select class="form-select" name="konto_id"><option value="">Kein Konto zugeordnet</option>{% for konto in konten_klasse2 %}<option value="{{ konto.id }}" {% if kunde and kunde.konto_id == konto.id %}selected{% endif %}>{{ konto.kontonummer }} - {{ konto.bezeichnung }}</option>{% endfor %}</select></div><div class="col-12"><label class="form-label">Notizen</label><textarea name="notizen" class="form-control" rows="3">{{ kunde.notizen if kunde else '' }}</textarea></div>{% if kunde %}<div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="aktiv" id="aktiv" value="1" {% if kunde.aktiv %}checked{% endif %}><label class="form-check-label" for="aktiv">Aktiv</label></div></div>{% endif %}</div><div class="d-flex justify-content-between mt-4"><a href="{{ url_for('fakturierung.kunden') }}" class="btn btn-outline-secondary">Zurück</a><button type="submit" class="btn btn-primary">Speichern</button></div></form></div></div></div></div>
{% endblock %}
