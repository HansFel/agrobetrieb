# MGRSoftware + AgroBetrieb Multi-Instanz Deployment
# MGRSoftware-Instanzen nutzen ghcr.io/hansfel/mgrsoftware:latest
# AgroBetrieb-Instanzen nutzen ghcr.io/hansfel/agrobetrieb:latest
# Alle sensiblen Daten werden aus .env gelesen
#
# Instanzen:
# - mg         (Maschinengemeinschaft) unter /mg
# - agr        (Agrargemeinschaft) unter /agr
# - gem1-5     (Gemeinschaften) unter /gem1 bis /gem5
# - agro1-10   (AgroBetrieb) unter /agro1 bis /agro10
#
# Verwendung: docker compose up -d

services:
  # ============================================================
  # Maschinengemeinschaft (mg)
  # ============================================================
  db:
    image: postgres:15
    container_name: mgr-db
    restart: always
    environment:
      POSTGRES_DB: maschinengemeinschaft
      POSTGRES_USER: mgr_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    image: ghcr.io/hansfel/mgrsoftware:latest
    container_name: mgr-app
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://mgr_user:${DB_PASSWORD}@db:5432/maschinengemeinschaft
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: production
      FLASK_APP: run.py
      APPLICATION_PREFIX: /mg
      INSTANCE_NAME: mg

    volumes:
      - uploads_mg:/opt/maschinengemeinschaft/app/static/uploads

    expose:
      - "5000"

  # ============================================================
  # Agrargemeinschaft (agr)
  # ============================================================
  db-agr:
    image: postgres:15
    container_name: mgr-db-agr
    restart: always
    environment:
      POSTGRES_DB: maschinengemeinschaft
      POSTGRES_USER: mgr_user
      POSTGRES_PASSWORD: ${DB_PASSWORD_AGR}
    volumes:
      - db_data_agr:/var/lib/postgresql/data

  web-agr:
    image: ghcr.io/hansfel/mgrsoftware:latest
    container_name: mgr-app-agr
    restart: always
    depends_on:
      - db-agr
    environment:
      DATABASE_URL: postgresql://mgr_user:${DB_PASSWORD_AGR}@db-agr:5432/maschinengemeinschaft
      SECRET_KEY: ${SECRET_KEY_AGR}
      FLASK_ENV: production
      FLASK_APP: run.py
      APPLICATION_PREFIX: /agr
      INSTANCE_NAME: agr

    volumes:
      - uploads_agr:/opt/maschinengemeinschaft/app/static/uploads

    expose:
      - "5000"

