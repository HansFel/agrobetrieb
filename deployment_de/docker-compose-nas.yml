    volumes:
      - db_data_agro30:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agr_user -d agrobetrieb"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-agro30:
    build:
      context: /volume1/docker/agrobetrieb
      dockerfile: deployment_de/Dockerfile
    image: agrobetrieb:local
    container_name: agro-app-30
    restart: always
    depends_on:
      db-agro30:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agr_user:${DB_PASSWORD_AGRO30}@db-agro30:5432/agrobetrieb
      SECRET_KEY: ${SECRET_KEY_AGRO30}
      FLASK_ENV: production
      FLASK_APP: run.py
      SUPERADMIN_USERNAMES: ${SUPERADMIN_USERNAMES}
      APPLICATION_PREFIX: /agro30
      INSTANCE_NAME: agro30
    volumes:
      - backups_agro30:/app/backups
    expose:
      - "5000"

  # ============================================================
  # Reverse Proxy (Caddy)
  # ============================================================
  caddy:
    image: caddy:2
    container_name: mgr-caddy
    restart: always
    depends_on:
      - web
      - web-agr
      - web-gem1
      - web-gem2
      - web-gem3
      - web-gem4
      - web-gem5
      - web-agro1
      - web-agro2
      - web-agro3
      - web-agro4
      - web-agro5
      - web-agro6
      - web-agro7
      - web-agro8
      - web-agro9
      - web-agro10
      - web-agro11
      - web-agro12
      - web-agro13
      - web-agro14
      - web-agro15
      - web-agro16
      - web-agro17
      - web-agro18
      - web-agro19
      - web-agro20
      - web-agro21
      - web-agro22
      - web-agro23
      - web-agro24
      - web-agro25
      - web-agro26
      - web-agro27
      - web-agro28
      - web-agro29
      - web-agro30
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile

