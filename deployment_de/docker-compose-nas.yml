# MGRSoftware + AgroBetrieb Multi-Instanz Deployment
# Lokales Build von /volume1/docker/mgrsoftware und /volume1/docker/agrobetrieb
# Kein GHCR Pull notwendig – deploy-to-nas.ps1 kopiert Quellen vor dem Build
#
# Instanzen:
# - mg         (Maschinengemeinschaft) unter /mg
# - agr        (Agrargemeinschaft) unter /agr
# - gem1-5     (Gemeinschaften) unter /gem1 bis /gem5
# - agro1-30   (AgroBetrieb) unter /agro1 bis /agro30
#
# Verwendung: docker compose up -d --build

services:
  # ============================================================
  # Maschinengemeinschaft (mg)
  # ============================================================
  db:
    image: postgres:17
    container_name: mgr-db
    restart: always
    environment:
      POSTGRES_DB: maschinengemeinschaft
      POSTGRES_USER: mgr_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build:
      context: /volume1/docker/mgrsoftware
      dockerfile: deployment_de/Dockerfile
    image: mgrsoftware:local
    container_name: mgr-app
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://mgr_user:${DB_PASSWORD}@db:5432/maschinengemeinschaft
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: production
      FLASK_APP: run.py
      APPLICATION_PREFIX: /mg
      INSTANCE_NAME: mg
      SSO_SECRET: ${SSO_SECRET}
    volumes:
      - uploads_mg:/opt/maschinengemeinschaft/app/static/uploads
    expose:
      - "5000"

  # ============================================================
  # Agrargemeinschaft (agr)
  # ============================================================
  db-agr:
    image: postgres:17
    container_name: mgr-db-agr
    restart: always
    environment:
      POSTGRES_DB: maschinengemeinschaft
      POSTGRES_USER: mgr_user
      POSTGRES_PASSWORD: ${DB_PASSWORD_AGR}
    volumes:
      - db_data_agr:/var/lib/postgresql/data

  web-agr:
    build:
      context: /volume1/docker/mgrsoftware
      dockerfile: deployment_de/Dockerfile
    image: mgrsoftware:local
    container_name: mgr-app-agr
    restart: always
    depends_on:
      - db-agr
    environment:
      DATABASE_URL: postgresql://mgr_user:${DB_PASSWORD_AGR}@db-agr:5432/maschinengemeinschaft
      SECRET_KEY: ${SECRET_KEY_AGR}
      FLASK_ENV: production
      FLASK_APP: run.py
      APPLICATION_PREFIX: /agr
      INSTANCE_NAME: agr
      SSO_SECRET: ${SSO_SECRET}
    volumes:
      - uploads_agr:/opt/maschinengemeinschaft/app/static/uploads
    expose:
      - "5000"

