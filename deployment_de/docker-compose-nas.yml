      - web-agro3
      - web-agro4
      - web-agro5
      - web-agro6
      - web-agro7
      - web-agro8
      - web-agro9
      - web-agro10
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile

