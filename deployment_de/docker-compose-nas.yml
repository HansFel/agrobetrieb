  caddy:
    image: caddy:2
    container_name: mgr-caddy
    restart: always
    depends_on:
      - web
      - web-agr
      - web-gem1
      - web-gem2
      - web-gem3
      - web-gem4
      - web-gem5
      - web-agro1
