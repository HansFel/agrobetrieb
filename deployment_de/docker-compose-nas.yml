      POSTGRES_PASSWORD: ${DB_PASSWORD_AGRO1}
    volumes:
      - db_data_agro1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agr_user -d agrobetrieb"]
      interval: 10s
      timeout: 5s
      retries: 5

